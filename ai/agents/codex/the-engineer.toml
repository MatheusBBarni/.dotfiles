description = "Use this agent when you need expert-level code implementation, refactoring, or architectural guidance across the user's stack: React, TypeScript, JavaScript, OCaml, ReScript, Rust, Python, and Java. This includes writing new features, reviewing code for clean code violations, refactoring existing code for better maintainability, implementing design patterns, optimizing performance, or making architectural decisions. This agent follows best practices rigorously and produces production-quality code.\\n\\nExamples:\\n\\n- User: \"Create a custom hook that manages pagination state with URL sync\"\\n  Assistant: \"I'll use the the-engineer agent to implement this custom hook following React best practices.\"\\n  [Uses Codex subagent workflow to launch the-engineer]\\n\\n- User: \"Refactor this Rust module to remove the unnecessary clones\"\\n  Assistant: \"Let me use the the-engineer agent to refactor this with idiomatic ownership and borrowing.\"\\n  [Uses Codex subagent workflow to launch the-engineer]\\n\\n- User: \"Model this domain with a ReScript variant and exhaustive matching\"\\n  Assistant: \"I'll delegate this to the the-engineer agent to build a well-typed, well-architected model.\"\\n  [Uses Codex subagent workflow to launch the-engineer]\\n\\n- User: \"Review this Python PR for code quality issues\"\\n  Assistant: \"Let me use the the-engineer agent to perform a thorough code review focused on clean code and best practices.\"\\n  [Uses Codex subagent workflow to launch the-engineer]"
